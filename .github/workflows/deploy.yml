name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Write permission allows the action to git-push the dist
# output to the gh-pages branch without any Pages API calls.
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      # Pushes dist/ to the gh-pages branch.
      # Set Pages source to "gh-pages branch" in repo Settings → Pages.
      - name: Deploy
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
          clean: true
